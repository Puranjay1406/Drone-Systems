<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Access – Drone Command</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-page">

<header class="main-nav">
  <div class="nav-container">
    <div class="logo">
      <span class="logo-icon">◆</span>
      <span class="logo-text">DRONE COMMAND</span>
    </div>
    <nav class="nav-links">
      <a href="brief.html">BRIEF</a>
      <a href="login.html" class="active">SECURE ACCESS</a>
    </nav>
  </div>
</header>

<section class="login-section">
  <div class="login-background">
    <div class="scan-line"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="login-container">
    <div class="login-header">
      <div class="security-badge">
        <div class="badge-inner">
          <span class="badge-icon">●</span>
          <span class="badge-status">SECURE</span>
        </div>
      </div>
      <h1 class="login-title">AUTHORIZED ACCESS</h1>
      <p class="login-subtitle">Military-grade authentication required</p>
    </div>

    <form class="login-form" id="loginForm">
      <div class="form-group">
        <label class="form-label">OPERATOR ID</label>
        <input id="username" type="text" class="form-input" placeholder="Enter authorization code" required>
        <div class="input-line"></div>
      </div>

      <div class="form-group">
        <label class="form-label">ACCESS KEY</label>
        <input id="password" type="password" class="form-input" placeholder="Enter secure passphrase" required>
        <div class="input-line"></div>
      </div>

      <p id="error-msg" style="color: red; font-size: 0.8rem; display: none; margin-bottom: 1rem;">
        Invalid credentials. Access denied.
      </p>

      <button type="submit" class="btn btn-primary btn-full">
        <span>AUTHENTICATE</span>
        <span class="btn-arrow">→</span>
      </button>

      <div class="security-notice">
        <div class="notice-icon">!</div>
        <p>
          This system is restricted to authorized personnel only.
          All access attempts are logged and monitored.
        </p>
      </div>
    </form>
  </div>
</section>

<script>
  document.getElementById("loginForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const errorMsg = document.getElementById("error-msg");

    try {
      const response = await fetch(
        `http://127.0.0.1:5000/login?username=${username}&password=${password}`
      );
      const data = await response.json();

      if (data.success) {
        // store user info for use across pages
        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("username", data.username);
        localStorage.setItem("full_name", data.full_name);
        localStorage.setItem("role", data.role);
        window.location.replace("index.html");
      } else {
        errorMsg.style.display = "block";
      }
    } catch (error) {
      errorMsg.textContent = "Could not connect to server. Make sure the backend is running.";
      errorMsg.style.display = "block";
    }
  });
</script>

</body>
</html>
